name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS deps
        run: pnpm install --no-frozen-lockfile

      - name: Build Tauri installer (NSIS)
        env:
          # Public, non-secret build config (baked into the shipped app).
          VITE_API_URL: https://api.mythera.ge/api/v1
          LAUNCHER_FEED_URL: https://api.mythera.ge/cdn/launcher
        run: pnpm tauri build --bundles nsis

      # --- Code signing (enabled once SignPath Foundation approves this project) ---
      # SignPath signs the produced installer on their side; the certificate's private key never lands
      # in this repo or its CI. See https://signpath.org. Until then, release builds are unsigned.

      - uses: actions/upload-artifact@v4
        with:
          name: mythera-launcher-windows
          path: src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error
