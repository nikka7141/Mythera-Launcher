name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS deps
        run: pnpm install --no-frozen-lockfile

      - name: Build Tauri installer (NSIS)
        env:
          # Public, non-secret build config (baked into the shipped app).
          VITE_API_URL: https://api.mythera.ge/api/v1
          LAUNCHER_FEED_URL: https://api.mythera.ge/cdn/launcher
        run: pnpm tauri build --bundles nsis

      # --- Code signing (enabled once SignPath Foundation approves this project) ---
      # SignPath signs the produced installer on their side; the certificate's private key never lands
      # in this repo or its CI. See https://signpath.org. Until then, release builds are unsigned.

      - uses: actions/upload-artifact@v4
        with:
          name: mythera-launcher-windows
          path: src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust (stable) + Apple targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS deps
        run: pnpm install --no-frozen-lockfile

      - name: Build Tauri installer (universal DMG)
        env:
          # Public, non-secret build config (baked into the shipped app).
          VITE_API_URL: https://api.mythera.ge/api/v1
          LAUNCHER_FEED_URL: https://api.mythera.ge/cdn/launcher
        # Universal (Intel + Apple Silicon) so a single .dmg runs on any Mac. Unsigned (no Apple Developer
        # ID yet) — Gatekeeper will require a right-click → Open on first launch (documented for users).
        run: pnpm tauri build --target universal-apple-darwin --bundles dmg

      - uses: actions/upload-artifact@v4
        with:
          name: mythera-launcher-macos
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Tauri v2 Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2 build-essential curl wget file

      - name: Install JS deps
        run: pnpm install --no-frozen-lockfile

      - name: Build Tauri installer (AppImage)
        env:
          # Public, non-secret build config (baked into the shipped app).
          VITE_API_URL: https://api.mythera.ge/api/v1
          LAUNCHER_FEED_URL: https://api.mythera.ge/cdn/launcher
        run: pnpm tauri build --bundles appimage

      - uses: actions/upload-artifact@v4
        with:
          name: mythera-launcher-linux
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
